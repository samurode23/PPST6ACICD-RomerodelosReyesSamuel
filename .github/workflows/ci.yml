name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Ejecutar Laravel Pint
        run: ./vendor/bin/pint --test

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      APP_ENV: testing
      APP_KEY: ${{ secrets.APP_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparar fichero de entorno
        run: cp .env.example .env

      - name: Limpiar caché de Laravel
        run: php artisan optimize:clear

      - name: Ejecutar tests
        run: php artisan test

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t peliculapp:test .

      - name: Verificar que la imagen existe
        run: docker images peliculapp:test

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Escanear dependencias con Composer Audit
        run: composer audit
