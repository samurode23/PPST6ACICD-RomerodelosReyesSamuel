name: Laravel Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      JWT_SECRET: test-secret-key-for-ci-only-12345678901234567890
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, sqlite, pdo_sqlite
          coverage: none

      - name: Instalar dependencias de Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparar fichero de entorno
        run: cp .env.example .env

      - name: Generar clave de aplicacion
        run: php artisan key:generate

      - name: Limpiar cache de Laravel
        run: php artisan optimize:clear

      - name: Ejecutar tests Feature de la actividad
        run: php artisan test tests/Feature/Auth/JwtAuthTest.php tests/Feature/Directores/DirectorApiTest.php tests/Feature/Peliculas/PeliculaApiTest.php tests/Feature/Security/SecurityTest.php
