name: CD

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and Push Docker image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir imagen Docker
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest .

      - name: Ejecutar contenedor para smoke test
        run: |
          docker run -d \
            --name peliculapp-smoke \
            -p 8000:8000 \
            -e APP_ENV=testing \
            -e APP_KEY="${{ secrets.APP_KEY }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=/tmp/database.sqlite \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            -e MAIL_MAILER=array \
            $IMAGE_NAME:${{ github.sha }}

      - name: Preparar base de datos del contenedor
        run: |
          sleep 5
          docker exec peliculapp-smoke sh -c "touch /tmp/database.sqlite"
          docker exec peliculapp-smoke php artisan migrate --force
          docker exec peliculapp-smoke php artisan tinker --execute="\\App\\Models\\User::factory()->create(['email' => 'usuario@example.com', 'password' => \\Illuminate\\Support\\Facades\\Hash::make('password')]);"

      - name: Smoke test del login
        run: |
          curl -i -X POST http://127.0.0.1:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"email":"usuario@example.com","password":"password"}' \
            | grep "200 OK"

      - name: Publicar imagen en GHCR
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Detener contenedor
        if: always()
        run: docker rm -f peliculapp-smoke || true
